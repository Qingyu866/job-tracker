server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

spring:
  application:
    name: job-tracker-backend
  banner:
    location: classpath:banner.txt
  # Database Configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/job_tracker?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:qingyu}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Jackson Configuration
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    # Long 类型序列化在 JacksonConfig.java 中配置（使用 ToStringSerializer）

# MyBatis Plus Configuration
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.jobtracker.*.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id  # 使用雪花算法生成ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Logging Configuration
logging:
  level:
    root: INFO
    com.jobtracker: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/job-tracker.log
    max-size: 10MB
    max-history: 30

# LangChain4j Configuration
langchain4j:
  # LM Studio Configuration (本地 LLM)
  lm-studio:
    base-url: ${LM_STUDIO_BASE_URL:http://127.0.0.1:1234/v1}
    api-key: ${LM_STUDIO_API_KEY:lm-studio}
    model-name: ${LM_STUDIO_MODEL:google/gemma-3-4b}
    temperature: 0.1
    timeout: 300
    max-retries: 1
  # Chat Memory Configuration
  chat-memory:
    window-size: 20

# Mock Interview Configuration
mock-interview:
  # 面试总轮数
  total-rounds: 6
  # 每轮最大问题数（1个问题 + 可能的追问）
  max-questions-per-round: 1
  # 是否启用追问功能
  enable-followup: false

# OCR Configuration
ocr:
  # 启用 OCR 功能
  enabled: true
  # 智谱文档解析配置
  zhipu:
    api-key: ${ZHIPU_API_KEY:03e1f729fdb04343bd04c3f14d0666de.emX3C5N7WX1XOvj4}  # 智谱AI API密钥（必填，从环境变量读取）
    tool-type: lite              # 解析工具类型：lite(轻量级)/prime(标准)/expert(高级)
    timeout: 300000              # 总超时时间（毫秒，默认5分钟）
    poll-interval: 3000          # 轮询间隔（毫秒，默认3秒）
    max-retries: 100             # 最大轮询次数（默认100次）

  # 文件限制
  limits:
    max-image-size: 10485760  # 10MB
    supported-formats: pdf,docx,jpg,jpeg,png

# Sa-Token Configuration
sa-token:
  # Token 名称（也是 Cookie 名称）
  token-name: authorization
  # Token 有效期（秒）- 7天
  timeout: 604800
  # 是否允许同一账号多地同时登录
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 Token
  is-share: false
  # Token 风格（可选值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: false
  # 是否从 Cookie 读取 Token
  is-read-cookie: false
  # 是否从 Header 读取 Token
  is-read-header: true
  # Token Header 名称
  token-prefix: Bearer
